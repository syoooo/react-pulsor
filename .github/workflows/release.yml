name: Release

# Publishes to npm when a v* tag is pushed, via trusted publishing (OIDC):
# npmjs.com → react-pulsor → Settings → Trusted Publisher must point at
# this repo + workflow file. No token; provenance is attached automatically.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm publish --access public
