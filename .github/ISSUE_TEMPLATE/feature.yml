name: Feature request
description: A new pattern, animate mode, palette or capability
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: >
        What should it look like or do? Reference images, other loaders,
        or a playground share URL that gets close are all welcome.
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: Where does it fit?
      description: >
        Pulsor's dials are geometry × pattern × envelope × color — a good
        feature usually extends one dial instead of adding a fifth.
