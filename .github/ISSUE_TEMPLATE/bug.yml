name: Bug report
description: Something renders or animates wrong
labels: [bug]
body:
  - type: input
    id: share-url
    attributes:
      label: Playground share URL
      description: >
        Reproduce the problem at https://react-pulsor.vercel.app and paste
        the address bar URL — it encodes your exact configuration and is
        the perfect repro.
      placeholder: https://react-pulsor.vercel.app/#p=…
  - type: textarea
    id: what
    attributes:
      label: What happens, and what did you expect?
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: react-pulsor 0.2.1 · React 19 · Chrome 140 / macOS
